{% extends "base.html" %}
{% block title %}Check your email — WX Form{% endblock %}
{% block unauth_content %}
<div class="w-full max-w-sm">
    <div class="text-center mb-8">
        <span class="inline-flex h-12 w-12 items-center justify-center rounded-full bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-300 mb-4">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
        </span>
        <h1 class="text-2xl font-semibold tracking-tight text-ink-900 dark:text-ink-50">Check your email</h1>
        <p class="mt-3 text-sm text-ink-500 dark:text-ink-400">If an account exists for the address you entered, we've sent a password reset link. Please check your inbox (and spam folder).</p>
    </div>
    <div class="text-center">
        <a href="{% url 'login' %}" class="v-btn v-btn-secondary">Back to sign in</a>
    </div>
</div>
{% endblock %}
