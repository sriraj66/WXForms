{% extends "base.html" %}
{% block title %}Password updated — WX Form{% endblock %}
{% block page_title %}Password updated{% endblock %}
{% block content %}
<div class="max-w-xl">
    <div class="v-card p-8 text-center">
        <span class="inline-flex h-12 w-12 items-center justify-center rounded-full bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-300 mb-4">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
        </span>
        <h2 class="text-lg font-semibold tracking-tight text-ink-900 dark:text-ink-50">Password updated</h2>
        <p class="mt-2 text-sm text-ink-500 dark:text-ink-400">Your account password was changed successfully.</p>
        <a href="{% url 'profile' %}" class="mt-5 v-btn v-btn-primary inline-flex">Back to profile</a>
    </div>
</div>
{% endblock %}
